name: GitHub DevSecOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ১. সিকিউরিটি চেক (SAST & SCA)
  security_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Source Code Scan (SAST)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      - name: Dependency Vulnerability Audit
        run: npm audit --audit-level=high || true

  # ২. বিল্ড এবং ডকার হাবে পুশ
  build_and_push:
    needs: security_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: alnomanbd/my-devsecops-app:latest

  # ৩. আপনার উবুন্টু পিসিতে অটোমেটিক ডেপ্লয়মেন্ট
  deploy_to_local:
    needs: build_and_push
    runs-on: self-hosted
    steps:
      - name: Pull and Run App in Local Docker
        run: |
          echo "Deploying application to Ubuntu machine..."
          docker pull alnomanbd/my-devsecops-app:latest
          docker rm -f my-running-app || true
          docker run -d -p 3000:3000 --name my-running-app alnomanbd/my-devsecops-app:latest
          echo "Deployment successful! App is live on http://localhost:3000"
