name: GitHub DevSecOps CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # (ম্যানুয়ালি রান করার অপশন)

jobs:
  # ১. সিকিউরিটি চেক এবং স্ক্যানিং (DevSecOps - SAST & SCA)
  security_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # SAST: সোর্স কোড স্ক্যান (Trivy দিয়ে)
      - name: Source Code Scan (SAST)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      # SCA: ডিপেন্ডেন্সি স্ক্যান (npm audit)
      - name: Dependency Vulnerability Audit
        run: npm audit --audit-level=high || true # (সহজে প্র্যাকটিসের জন্য ট্রু দেওয়া, যাতে কোনো বাগ থাকলে পাইপলাইন ফেইল না করে)

  # ২. বিল্ড এবং ডকার হাবে পুশ
  build_and_push:
    needs: security_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ডকার ইমেজ বিল্ড এবং পুশ (এখানে alnomanbd ইউজারনেমটি সেট করে দিয়েছি)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: alnomanbd/my-devsecops-app:latest
